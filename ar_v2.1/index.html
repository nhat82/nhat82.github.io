<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>AR Plant Viewer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/three.js/build/ar-threex-location-only.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>
    <script src="./script.js"></script>
    <script src="./compass.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- AR Scene -->
    <a-scene vr-mode-ui="enabled: false" arjs="sourceType: webcam; debugUIEnabled: false"
        renderer="antialias: true; alpha: true">
        <a-entity cursor="rayOrigin: mouse"></a-entity>
        <a-camera gps-new-camera></a-camera>
    </a-scene>

    <!-- Calibration Panel - initially visible -->
    <div id="calibration-panel">
        <h1>🔁 Calibrate Your Heading</h1>
        <p>Face north (or any known direction), then tap below.</p>
        
        <div id="compass">
            <div id="compass-needle"></div>
            <div id="compass-face">N</div>
        </div>
        
        <p id="calibration-heading">Waiting for orientation...</p>
        <button id="calibrate-btn">Calibrate & Continue</button>
    </div>

    <!-- Info Container - initially hidden -->
    <div id="info-container">
        <h3>Plants Explorer 🌺</h3>
        
        <div class="info-flex">
            <div class="info-main">
                <p id="user-location">Fetching location...</p>
                <p id="heading">Heading: ...</p>
                <div id="selected-plant-info">Tap a blue plant marker to see details here</div>
            </div>
            
            <div class="info-compass-container">
                <div id="info-compass">
                    <div id="info-compass-needle"></div>
                </div>
            </div>

            <div class="compass">
                <div class="arrow"></div>
                <div class="compass-circle"></div>
                <div class="my-point"></div>
              </div>
              <button class="start-btn">Start compass</button>
            </div>
        
        <div class="legend">
            <div class="legend-item"><span class="dot blue-dot"></span> Plants</div>
            <div class="legend-item"><span class="dot red-dot"></span> Current User</div>
        </div>
        
        <h4>Closest Plants:</h4>
        <ol id="plant-list"></ol>
        
        <button id="recalibrate-btn">Recalibrate</button>
    </div>
</body>

</html>
