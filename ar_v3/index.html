<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR.js A-Frame Location-based</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ar.js@1.7.2/aframe/build/aframe-ar.min.js"></script>
    <script src="./script.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* A-Frame Scene (70% height) */
        #scene-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 80%;
            background: black;
        }

        /* Info Panel (30% height) */
        #info-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 20%;
            background: white;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            overflow-y: auto;
        }

        #user-location {
            font-weight: bold;
            margin-bottom: 5px;
        }

        #plant-list {
            list-style-type: decimal; /* Ensures numbers are shown */
        }
    </style>
</head>
<body>
    <a-scene 
        embedded 
        arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false" 
        renderer="antialias: true; alpha: true">
        
        <a-camera 
            position="0 1.6 0" 
            fov="80"
            arjs-device-orientation-controls='smoothingFactor: 0.1' 
            gps-new-camera='gpsMinDistance: 5; rotate: true'> 
            <a-cursor></a-cursor>
        </a-camera>

    </a-scene>
    
    <!-- Info Panel -->
    <div id="info-container">
        <p>Plants V2 🌺</p>
        <p id="user-location">Fetching data...</p>
        <ol id="plant-list"> Closest plants </ol>
        <div id="info">
            Click the box to see info here.
        </div>
    </div>

    <script>
        // Adjust AR.js settings dynamically
        document.querySelector("a-scene").setAttribute("arjs", `
            sourceType: webcam; 
            sourceWidth: ${window.innerWidth}; 
            sourceHeight: ${window.innerHeight}; 
            displayWidth: ${window.innerWidth}; 
            displayHeight: ${window.innerHeight}; 
            videoTexture: true; 
            debugUIEnabled: false
        `);
    </script>
</body>
</html>
