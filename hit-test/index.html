<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR.js A-Frame Location-based</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script type="text/javascript" src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/three.js/build/ar-threex-location-only.js"></script>
    <script type="text/javascript" src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>
    <script src="./script.js"></script>
</head>
<body>
    <a-scene vr-mode-ui="enabled: false" arjs="sourceType: webcam; sourceWidth:1280; sourceHeight:960; displayWidth:1280; displayHeight:960; videoTexture: true; debugUIEnabled: false" renderer="antialias: true; alpha: true">
        <a-camera arjs-device-orientation-controls='smoothingFactor: 0.1' gps-new-camera='gpsMinDistance: 5'> </a-camera>
            <!-- Dot for user's location (will update dynamically) -->
        <a-entity id="user-dot" 
            geometry="primitive: sphere; radius: 0.1" 
            material="color: red" 
            gps-entity-place="longitude: 0; latitude: 0;">
        </a-entity>
    </a-scene>
    
    <!-- Info Panel -->
    <div id="info-container">
        <p>Hit test</p>
    </div>
</body>
</html>
