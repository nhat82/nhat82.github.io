<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script type="text/javascript" src='https://rawgit.com/ngokevin/aframe-animation-component/master/dist/aframe-animation-component.min.js'></script>
    <script>
      AFRAME.registerComponent('clickable', {
        init: function () {
          this.el.addEventListener('click', function () {
            alert('Clicked');
          });
        }
      });
    </script>
  </head>
  <body>
    <a-scene>
      <a-camera><a-cursor rayOrigin="mouse"></a-cursor></a-camera>
      <a-box id="myBox" position="0 1 -3" color="blue" clickable></a-box>
      <a-plane position="0 0 -4" rotation="-90 0 0" width="4" height="4" color="#7BC8A4"></a-plane>
      <a-sky color="#ECECEC"></a-sky>
    </a-scene>
  </body>
</html>
